version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: despesas_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: despesas_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_despesas
    restart: unless-stopped
    ports:
      - "5672:5672"   # Porta de comunicação com o C#
      - "15672:15672" # Porta do painel visual web
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123

volumes:
  pgdata: